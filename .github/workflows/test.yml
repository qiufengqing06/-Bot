name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e .
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check nonebot_agent/
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v
